<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Impostor Game PRO+</title>
  <style>
    body { font-family: Arial; max-width: 750px; margin: auto; }
    button { margin: 4px; }
    .card { padding: 10px; border: 1px solid #ccc; margin-top: 10px; }
  </style>
</head>
<body>

<h2>🎮 Impostor Game PRO+</h2>

<input id="code" placeholder="room code">
<input id="nick" placeholder="nick">
<br>
<button onclick="createRoom()">Create room</button>
<button onclick="joinRoom()">Join room</button>
<button onclick="startGame()">Start game</button>
<button onclick="startVoting()">Start voting</button>

<div class="card">
  <h3 id="roomTitle">No room</h3>
  <div id="players"></div>
</div>

<div class="card">
  <h3>Game</h3>
  <div id="role"></div>
</div>

<div class="card">
  <h3>Voting 🗳️</h3>
  <div id="votes"></div>
</div>

<div class="card">
  <h3>Vote player</h3>
  <div id="voteButtons"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://inbdtzacrdtzkuldmedj.supabase.co/rest/v1/",
  "sb_publishable_NJcYRaw09I5ZFbDDIEyeJg_tTdaG1NE"
);

let currentRoom = null;
let nick = null;
let channel = null;

const words = ["pizza","car","school","computer","banana","football"];

/* CREATE ROOM */
window.createRoom = async () => {
  const code = document.getElementById("code").value;
  nick = document.getElementById("nick").value;

  const { error } = await supabase.from("rooms").insert({
    code,
    players: [nick],
    word: words[Math.floor(Math.random() * words.length)],
    impostor: null,
    started: false,
    votes: {},
    eliminated: []
  });

  if (error) return alert(error.message);

  currentRoom = code;
  openRoom(code);
};

/* JOIN */
window.joinRoom = async () => {
  const code = document.getElementById("code").value;
  nick = document.getElementById("nick").value;

  const { data } = await supabase
    .from("rooms")
    .select("*")
    .eq("code", code)
    .single();

  if (!data) return alert("Room not found");

  let players = data.players || [];
  if (!players.includes(nick)) players.push(nick);

  await supabase.from("rooms")
    .update({ players })
    .eq("code", code);

  currentRoom = code;
  openRoom(code);
};

/* START GAME */
window.startGame = async () => {
  const { data } = await supabase
    .from("rooms")
    .select("*")
    .eq("code", currentRoom)
    .single();

  const players = data.players;
  const impostor = players[Math.floor(Math.random() * players.length)];

  await supabase.from("rooms")
    .update({ impostor, started: true, votes: {} })
    .eq("code", currentRoom);
};

/* START VOTING */
window.startVoting = async () => {
  await supabase.from("rooms")
    .update({ votes: {} })
    .eq("code", currentRoom);
};

/* VOTE PLAYER */
window.votePlayer = async (target) => {
  const { data } = await supabase
    .from("rooms")
    .select("*")
    .eq("code", currentRoom)
    .single();

  let votes = data.votes || {};

  votes[target] = (votes[target] || 0) + 1;

  await supabase.from("rooms")
    .update({ votes })
    .eq("code", currentRoom);
};

/* ELIMINATE HIGHEST */
window.eliminate = async () => {
  const { data } = await supabase
    .from("rooms")
    .select("*")
    .eq("code", currentRoom)
    .single();

  let votes = data.votes || {};
  let players = data.players || [];

  let maxPlayer = Object.keys(votes).reduce((a,b)=>
    votes[a] > votes[b] ? a : b
  );

  let eliminated = data.eliminated || [];
  eliminated.push(maxPlayer);

  players = players.filter(p => p !== maxPlayer);

  await supabase.from("rooms")
    .update({ players, eliminated, votes: {} })
    .eq("code", currentRoom);
};

/* OPEN */
function openRoom(code){
  document.getElementById("roomTitle").innerText = "Room: " + code;
  loadRoom(code);
  listenRoom(code);
}

/* LOAD */
async function loadRoom(code){
  const { data } = await supabase
    .from("rooms")
    .select("*")
    .eq("code", code)
    .single();

  if (!data) return;

  document.getElementById("players").innerHTML =
    (data.players || []).map(p => "👤 " + p).join("<br>");

  document.getElementById("votes").innerHTML =
    JSON.stringify(data.votes || {}, null, 2);

  document.getElementById("voteButtons").innerHTML =
    (data.players || []).map(p =>
      `<button onclick="votePlayer('${p}')">Vote ${p}</button>`
    ).join("<br>");

  if (data.started) {
    if (data.impostor === nick) {
      document.getElementById("role").innerText = "😈 IMPOSTOR";
    } else {
      document.getElementById("role").innerText = "Word: " + data.word;
    }
  }
}

/* REALTIME */
function listenRoom(code){
  if (channel) supabase.removeChannel(channel);

  channel = supabase
    .channel("room-" + code)
    .on("postgres_changes",
      {
        event: "UPDATE",
        schema: "public",
        table: "rooms",
        filter: `code=eq.${code}`
      },
      () => loadRoom(code)
    )
    .subscribe();
}

</script>
</body>
</html>
