<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Impostor Stable</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.container{max-width:800px;margin:auto;padding:15px;}

.card{
  background:rgba(255,255,255,0.08);
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input,select,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{background:#6366f1;color:white;font-weight:bold;}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.player{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#f97316;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
  flex-direction:column;
}

.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}

.hidden{display:none;}

.table{
  text-align:left;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🎭 IMPOSTOR STABLE</h1>

<div class="container">

<div class="card">
  <h3>Ustawienia</h3>
  <input type="number" id="impCount" value="1" min="1">
  <select id="knows">
    <option value="yes">Impostorzy się znają</option>
    <option value="no">Nie znają się</option>
  </select>
</div>

<div class="card">
  <h3>Hasło</h3>
  <input id="word" placeholder="hasło">
  <input id="hint" placeholder="podpowiedź">
  <button onclick="addWord()">Dodaj</button>
</div>

<div class="card">
  <h3>Gracze</h3>
  <input id="name" placeholder="imię">
  <button onclick="addPlayer()">Dodaj</button>
</div>

<div class="card">
  <button onclick="start()">START</button>
</div>

<div class="card">
  <div id="playersList"></div>
</div>

<div class="card hidden" id="game">
  <h2>Kliknij gracza</h2>
  <div class="grid" id="grid"></div>
</div>

<div class="popup hidden" id="popup">
  <h2 id="pName"></h2>
  <p id="pRole"></p>
  <button onclick="closePopup()">OK</button>
</div>

</div>

<script>

let db=[];
let players=[];
let impostors=[];
let current=null;
let shown=0;

function addWord(){
  if(!word.value||!hint.value) return;
  db.push({w:word.value,h:hint.value});
  word.value=""; hint.value="";
}

function addPlayer(){
  if(!name.value) return;
  players.push(name.value);
  name.value="";
  renderPlayers();
}

function renderPlayers(){
  playersList.innerHTML=players.map(p=>"👤 "+p).join("<br>");
}

function start(){

  if(players.length<2 || db.length==0){
    alert("Dodaj dane");
    return;
  }

  current=db[Math.floor(Math.random()*db.length)];

  let count=Math.min(+impCount.value,players.length);

  impostors=[];

  while(impostors.length<count){
    let r=Math.floor(Math.random()*players.length);
    if(!impostors.includes(r)) impostors.push(r);
  }

  shown=0;

  document.getElementById("game").classList.remove("hidden");

  renderGrid();
}

function renderGrid(){
  grid.innerHTML=players.map((p,i)=>
    `<div class='player' onclick='show(${i})'>🏀${p}</div>`
  ).join("");
}

function show(i){

  popup.classList.remove("hidden");

  let isImp=impostors.includes(i);

  pName.innerText=players[i];

  let impNames=impostors.map(x=>players[x]);

  if(isImp){
    let extra="";
    if(knows.value==="yes"){
      extra="<br>🤝 "+impNames.filter(n=>n!==players[i]).join(", ");
    }
    pRole.innerHTML="🚨 IMPOSTOR<br>"+current.h+extra;
  } else {
    pRole.innerHTML="🔤 HASŁO: "+current.w;
  }
}

function closePopup(){
  popup.classList.add("hidden");
  shown++;

  if(shown>=players.length){
    alert("KONIEC PODGLĄDU (tu możesz dodać vote)");
  }
}

</script>

</body>
</html>
