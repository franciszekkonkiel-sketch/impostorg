<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impostor Online</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.08);
  margin:10px;
  padding:15px;
  border-radius:14px;
}

input,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

button{
  background:#6366f1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.hidden{
  display:none;
}

.players{
  margin-top:10px;
}
</style>
</head>
<body>

<h1>🎭 IMPOSTOR ONLINE</h1>

<div class="container">

<div class="card">
  <h2>👤 Nick</h2>
  <input id="nickname" placeholder="Twój nick">
</div>

<div class="card">
  <h2>🏠 Pokój</h2>

  <button onclick="createRoom()">Stwórz pokój</button>

  <br><br>

  <input id="roomCode" placeholder="Kod pokoju">
  <button onclick="joinRoom()">Dołącz</button>
</div>

<div class="card hidden" id="roomBox">
  <h2 id="roomTitle"></h2>

  <div class="players" id="players"></div>
</div>

</div>

<script>

/* 🔥 SUPABASE */
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_KEY"
);

/* DATA */
let currentRoom = null;

/* CREATE ROOM */
async function createRoom(){

  const code = Math.random()
    .toString(36)
    .substring(2,7)
    .toUpperCase();

  const nick = document.getElementById("nickname").value;

  if(!nick){
    alert("Wpisz nick");
    return;
  }

  await supabase
    .from("rooms")
    .insert({
      code:code,
      players:[nick],
      game:{}
    });

  currentRoom = code;

  openRoom(code);
}

/* JOIN */
async function joinRoom(){

  const code = document
    .getElementById("roomCode")
    .value
    .toUpperCase();

  const nick = document
    .getElementById("nickname")
    .value;

  if(!nick || !code){
    alert("Wpisz dane");
    return;
  }

  let { data } = await supabase
    .from("rooms")
    .select("*")
    .eq("code",code)
    .single();

  if(!data){
    alert("Pokój nie istnieje");
    return;
  }

  let players = data.players || [];

  players.push(nick);

  await supabase
    .from("rooms")
    .update({ players:players })
    .eq("code",code);

  currentRoom = code;

  openRoom(code);
}

/* OPEN ROOM */
async function openRoom(code){

  document
    .getElementById("roomBox")
    .classList
    .remove("hidden");

  document
    .getElementById("roomTitle")
    .innerText = "Pokój: " + code;

  loadPlayers(code);

  listenRoom(code);
}

/* LOAD PLAYERS */
async function loadPlayers(code){

  let { data } = await supabase
    .from("rooms")
    .select("*")
    .eq("code",code)
    .single();

  document
    .getElementById("players")
    .innerHTML = data.players
      .map(p=>"👤 "+p)
      .join("<br>");
}

/* REALTIME */
function listenRoom(code){

  supabase
    .channel("room-"+code)
    .on(
      "postgres_changes",
      {
        event:"UPDATE",
        schema:"public",
        table:"rooms"
      },
      payload=>{

        if(payload.new.code === code){

          document
            .getElementById("players")
            .innerHTML = payload.new.players
              .map(p=>"👤 "+p)
              .join("<br>");
        }
      }
    )
    .subscribe();
}

</script>
</body>
</html>
