# IMPOSTOR GAME — FINAL WORKING VERSION

Skopiuj CAŁOŚĆ do pliku `index.html`

```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impostor Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.08);
  margin:10px;
  padding:15px;
  border-radius:14px;
}

input,select,button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

button{
  background:#6366f1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.hidden{
  display:none;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.ball{
  width:100px;
  height:100px;
  border-radius:50%;
  background:#f97316;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
}

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.dbItem{
  background:rgba(255,255,255,0.05);
  padding:8px;
  margin:5px 0;
  border-radius:8px;
}

.scoreBox{
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
}
</style>
</head>
<body>

<h1>🎭 IMPOSTOR GAME FINAL</h1>

<div class="container">

<div class="card">
  <h3>⚙️ Ustawienia</h3>

  <label>Ilu impostorów?</label><br>
  <input type="number" id="impCount" value="1" min="1"><br><br>

  <label>Czy impostorzy się znają?</label><br>
  <select id="knows">
    <option value="yes">Tak</option>
    <option value="no">Nie</option>
  </select>
</div>

<div class="card">
  <h3>📚 Baza haseł</h3>

  <input id="wordInput" placeholder="Hasło">
  <input id="hintInput" placeholder="Podpowiedź">

  <button onclick="addWord()">Dodaj</button>

  <div id="db"></div>
</div>

<div class="card">
  <h3>👥 Gracze</h3>

  <input id="nameInput" placeholder="Imię">
  <button onclick="addPlayer()">Dodaj</button>

  <div id="playersList"></div>
</div>

<div class="card">
  <button onclick="startGame()">START</button>
</div>

<div class="card hidden" id="gameBox">
  <h2>🏀 Kliknij swoją piłkę</h2>
  <div class="grid" id="grid"></div>
</div>

<div class="popup hidden" id="popup">
  <h2 id="popupName"></h2>
  <div id="popupRole"></div>
  <br>
  <button onclick="closePopup()">OK</button>
</div>

<div class="card hidden" id="voteBox">
  <h2>🗳️ Głosowanie</h2>
  <div id="voteList"></div>
  <button onclick="finishVote()">Zakończ głosowanie</button>
</div>

<div class="card hidden" id="endBox">
  <h2 id="result"></h2>
  <div class="scoreBox" id="scoreBoard"></div>
  <button onclick="restartGame()">Nowa runda</button>
</div>

</div>

<script>

/* ELEMENTY */
const dbDiv = document.getElementById("db");
const playersList = document.getElementById("playersList");
const gameBox = document.getElementById("gameBox");
const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const popupName = document.getElementById("popupName");
const popupRole = document.getElementById("popupRole");
const voteBox = document.getElementById("voteBox");
const voteList = document.getElementById("voteList");
const endBox = document.getElementById("endBox");
const result = document.getElementById("result");
const scoreBoard = document.getElementById("scoreBoard");

/* INPUTY */
const wordInput = document.getElementById("wordInput");
const hintInput = document.getElementById("hintInput");
const nameInput = document.getElementById("nameInput");
const impCount = document.getElementById("impCount");
const knows = document.getElementById("knows");

/* DANE */
let db = JSON.parse(localStorage.getItem("db")) || [];
let players = [];
let impostors = [];
let currentWord = null;
let shownPlayers = [];
let votes = {};
let scores = {};

/* BAZA */
function addWord(){

  const w = wordInput.value.trim();
  const h = hintInput.value.trim();

  if(!w || !h) return;

  db.push({word:w, hint:h});

  localStorage.setItem("db", JSON.stringify(db));

  wordInput.value = "";
  hintInput.value = "";

  renderDB();
}

function renderDB(){

  if(db.length === 0){
    dbDiv.innerHTML = "Brak haseł";
    return;
  }

  dbDiv.innerHTML = db.map((item,index)=>
    `
    <div class="dbItem">
      🔤 ${item.word} → 💡 ${item.hint}
      <button onclick="deleteWord(${index})">X</button>
    </div>
    `
  ).join("");
}

function deleteWord(index){

  db.splice(index,1);

  localStorage.setItem("db", JSON.stringify(db));

  renderDB();
}

/* GRACZE */
function addPlayer(){

  const name = nameInput.value.trim();

  if(!name) return;

  players.push(name);

  if(!scores[name]){
    scores[name] = 0;
  }

  nameInput.value = "";

  renderPlayers();
}

function renderPlayers(){

  playersList.innerHTML = players.map(p=>`👤 ${p}`).join("<br>");
}

/* START */
function startGame(){

  if(players.length < 2){
    alert("Dodaj minimum 2 graczy");
    return;
  }

  if(db.length === 0){
    alert("Dodaj hasła");
    return;
  }

  currentWord = db[Math.floor(Math.random()*db.length)];

  impostors = [];

  const count = Math.min(parseInt(impCount.value), players.length-1);

  while(impostors.length < count){

    const randomIndex = Math.floor(Math.random()*players.length);

    if(!impostors.includes(randomIndex)){
      impostors.push(randomIndex);
    }
  }

  shownPlayers = [];
  votes = {};

  gameBox.classList.remove("hidden");
  voteBox.classList.add("hidden");
  endBox.classList.add("hidden");

  renderGrid();
}

/* PIŁKI */
function renderGrid(){

  grid.innerHTML = players.map((player,index)=>
    `
    <div class="ball" onclick="showRole(${index})">
      🏀
      <div>${player}</div>
    </div>
    `
  ).join("");
}

/* ROLA */
function showRole(index){

  if(shownPlayers.includes(index)) return;

  popup.classList.remove("hidden");

  popupName.innerText = players[index];

  const isImpostor = impostors.includes(index);

  if(isImpostor){

    let text = `
      <h2>🚨 JESTEŚ IMPOSTOREM</h2>
      <p>💡 Podpowiedź: ${currentWord.hint}</p>
    `;

    if(knows.value === "yes"){

      const otherImpostors = impostors
        .filter(i=>i!==index)
        .map(i=>players[i]);

      if(otherImpostors.length > 0){
        text += `<p>🤝 Inni impostorzy: ${otherImpostors.join(", ")}</p>`;
      }
    }

    popupRole.innerHTML = text;

  }else{

    popupRole.innerHTML = `
      <h2>✅ Jesteś zwykłym graczem</h2>
      <p>🔤 HASŁO: ${currentWord.word}</p>
    `;
  }

  shownPlayers.push(index);
}

/* ZAMKNIĘCIE */
function closePopup(){

  popup.classList.add("hidden");

  if(shownPlayers.length >= players.length){

    setTimeout(()=>{
      startVoting();
    },200);
  }
}

/* GŁOSOWANIE */
function startVoting(){

  voteBox.classList.remove("hidden");

  voteList.innerHTML = players.map((player,index)=>
    `
    <div>
      ${player}
      <button onclick="votePlayer(${index})">GŁOS</button>
    </div>
    `
  ).join("");
}

function votePlayer(index){

  votes[index] = (votes[index] || 0) + 1;

  alert(`Oddano głos na ${players[index]}`);
}

/* KONIEC */
function finishVote(){

  let maxVotes = -1;
  let eliminated = null;

  for(const index in votes){

    if(votes[index] > maxVotes){
      maxVotes = votes[index];
      eliminated = parseInt(index);
    }
  }

  if(eliminated === null){
    result.innerText = "❌ Nikt nie został wyeliminowany";
  }
  else if(impostors.includes(eliminated)){

    result.innerText = `🚨 Wyrzucono impostora: ${players[eliminated]}`;

    players.forEach((player,index)=>{
      if(!impostors.includes(index)){
        scores[player] += 1;
      }
    });

  }else{

    result.innerText = `❌ Wyrzucono niewinnego: ${players[eliminated]}`;

    impostors.forEach(index=>{
      scores[players[index]] += 2;
    });
  }

  renderScores();

  voteBox.classList.add("hidden");
  endBox.classList.remove("hidden");
}

/* RANKING */
function renderScores(){

  scoreBoard.innerHTML = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1])
    .map(item=>`${item[0]}: ${item[1]} pkt`)
    .join("<br>");
}

/* RESTART */
function restartGame(){

  shownPlayers = [];
  votes = {};

  startGame();
}

/* INIT */
renderDB();
renderPlayers();

</script>

</body>
</html>
```
