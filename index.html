<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Impostor FIXED</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.container{max-width:850px;margin:auto;padding:15px;}

.card{
  background:rgba(255,255,255,0.08);
  margin:10px;
  padding:15px;
  border-radius:12px;
}

input,select,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#6366f1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.hidden{display:none;}

.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.player{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#f97316;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
}

.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.table{
  text-align:left;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🎭 IMPOSTOR FIXED</h1>

<div class="container">

<div class="card">
  <h3>⚙️ Ustawienia</h3>
  <input type="number" id="impCount" value="1" min="1">
  <select id="knows">
    <option value="yes">Impostorzy się znają</option>
    <option value="no">Nie znają się</option>
  </select>
</div>

<div class="card">
  <h3>📚 Hasła</h3>
  <input id="word" placeholder="hasło">
  <input id="hint" placeholder="podpowiedź">
  <button onclick="addWord()">Dodaj</button>

  <div id="db"></div>
</div>

<div class="card">
  <h3>👥 Gracze</h3>
  <input id="name" placeholder="imię">
  <button onclick="addPlayer()">Dodaj</button>
</div>

<div class="card">
  <button onclick="startGame()">START</button>
</div>

<div class="card">
  <div id="playersList"></div>
</div>

<div class="card hidden" id="game">
  <h2>🏀 Kliknij gracza</h2>
  <div class="grid" id="grid"></div>
</div>

<div class="popup hidden" id="popup">
  <h2 id="pName"></h2>
  <p id="pRole"></p>
  <button onclick="closePopup()">OK</button>
</div>

<div class="card hidden" id="voteBox">
  <h2>🗳️ GŁOSOWANIE</h2>
  <div id="voteList"></div>
  <button onclick="finishVote()">Zakończ</button>
</div>

<div class="card hidden" id="end">
  <h2 id="result"></h2>
  <div id="score"></div>
  <button onclick="restart()">Nowa runda</button>
</div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || [];
let players = [];
let impostors = [];
let current = null;
let shown = 0;
let votes = {};
let scores = {};

/* HASŁA */
function addWord(){
  if(!word.value||!hint.value) return;
  db.push({w:word.value,h:hint.value});
  localStorage.setItem("db",JSON.stringify(db));
  word.value=""; hint.value="";
  renderDB();
}

function renderDB(){
  dbDiv.innerHTML=db.map((d,i)=>
    `<div>${d.w} → ${d.h}
    <button onclick="delWord(${i})">X</button></div>`
  ).join("");
}

function delWord(i){
  db.splice(i,1);
  localStorage.setItem("db",JSON.stringify(db));
  renderDB();
}

/* GRACZE */
function addPlayer(){
  if(!name.value) return;
  players.push(name.value);
  scores[name.value]=scores[name.value]||0;
  name.value="";
  renderPlayers();
}

function renderPlayers(){
  playersList.innerHTML=players.map(p=>"👤 "+p).join("<br>");
}

/* START */
function startGame(){

  if(players.length<2 || db.length===0)
    return alert("Dodaj dane");

  current=db[Math.floor(Math.random()*db.length)];

  let count=Math.min(+impCount.value,players.length);

  impostors=[];

  while(impostors.length<count){
    let r=Math.floor(Math.random()*players.length);
    if(!impostors.includes(r)) impostors.push(r);
  }

  shown=0;
  votes={};

  game.classList.remove("hidden");
  voteBox.classList.add("hidden");
  end.classList.add("hidden");

  renderGrid();
}

/* GRID */
function renderGrid(){
  grid.innerHTML=players.map((p,i)=>
    `<div class='player' onclick='show(${i})'>🏀${p}</div>`
  ).join("");
}

/* SHOW */
function show(i){

  popup.classList.remove("hidden");

  let isImp=impostors.includes(i);
  let impNames=impostors.map(x=>players[x]);

  pName.innerText=players[i];

  if(isImp){

    let extra="";
    if(knows.value==="yes"){
      extra="<br>🤝 "+impNames.filter(n=>n!==players[i]).join(", ");
    }

    pRole.innerHTML="🚨 IMPOSTOR<br>"+current.h+extra;

  } else {
    pRole.innerHTML="🔤 HASŁO: "+current.w;
  }
}

/* 🔥 FIXED CLOSE (TO JEST KLUCZ) */
function closePopup(){

  popup.classList.add("hidden");

  shown++;

  if(shown >= players.length){

    setTimeout(()=>{
      startVote();
    },200);

  }
}

/* VOTE */
function startVote(){

  voteBox.classList.remove("hidden");

  voteList.innerHTML=players.map((p,i)=>
    `<div>${p} <button onclick='vote(${i})'>GŁOS</button></div>`
  ).join("");
}

function vote(i){
  votes[i]=(votes[i]||0)+1;
}

/* END */
function finishVote(){

  let max=0;
  let out=0;

  for(let i in votes){
    if(votes[i]>max){
      max=votes[i];
      out=i;
    }
  }

  out=+out;

  if(impostors.includes(out)){
    result.innerText="🚨 IMPOSTOR: "+players[out];
    scores[players[out]]=(scores[players[out]]||0)+2;
  } else {
    result.innerText="❌ niewinny: "+players[out];
  }

  score.innerHTML=players.map(p=>`${p}: ${scores[p]||0}`).join("<br>");

  voteBox.classList.add("hidden");
  end.classList.remove("hidden");
}

/* RESET */
function restart(){
  location.reload();
}

/* INIT */
renderDB();
renderPlayers();

</script>

</body>
</html>
