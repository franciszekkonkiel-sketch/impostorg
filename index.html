<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Impostor Game FINAL</title>
<style>
body { font-family: Arial; max-width: 800px; margin:auto; }
.card { border:1px solid #ccc; padding:10px; margin-top:10px; }
button { margin:4px; }
</style>
</head>
<body>

<h2>🎮 Impostor Game FINAL</h2>

<div class="card">
  <input id="code" placeholder="room code">
  <input id="nick" placeholder="nick">
  <br>
  <button onclick="createRoom()">Create</button>
  <button onclick="joinRoom()">Join</button>
  <button onclick="startGame()">Start</button>
</div>

<div class="card">
  <h3 id="roomTitle">No room</h3>
  <div id="players"></div>
</div>

<div class="card">
  <h3>Role</h3>
  <button onclick="showRole()">Reveal role</button>
  <button onclick="hideRole()">Hide (pass phone)</button>
  <div id="role"></div>
</div>

<div class="card">
  <h3>Host panel</h3>
  <input id="word" placeholder="set word (host)">
  <button onclick="setWord()">Set word</button>
</div>

<div class="card">
  <h3>Hints</h3>
  <input id="hint" placeholder="add hint">
  <button onclick="addHint()">Add</button>
  <div id="hints"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://inbdtzacrdtzkuldmedj.supabase.co",
  "sb_publishable_NJcYRaw09I5ZFbDDIEyeJg_tTdaG1NE"
);

let room = null;
let nick = null;
let myRole = "";
let channel = null;

/* CREATE ROOM */
window.createRoom = async () => {
  room = document.getElementById("code").value;
  nick = document.getElementById("nick").value;

  await supabase.from("rooms").insert({
    code: room,
    host: nick,
    word: "",
    started: false,
    players: [{ nick, role: "" }],
    hints: []
  });

  openRoom(room);
};

/* JOIN ROOM */
window.joinRoom = async () => {
  room = document.getElementById("code").value;
  nick = document.getElementById("nick").value;

  const { data } = await supabase.from("rooms").select("*").eq("code", room).single();

  let players = data.players || [];
  players.push({ nick, role: "" });

  await supabase.from("rooms").update({ players }).eq("code", room);

  openRoom(room);
};

/* SET WORD (HOST) */
window.setWord = async () => {
  const word = document.getElementById("word").value;

  await supabase.from("rooms").update({ word }).eq("code", room);
};

/* START GAME */
window.startGame = async () => {
  const { data } = await supabase.from("rooms").select("*").eq("code", room).single();

  let players = data.players;

  let impostorIndex = Math.floor(Math.random() * players.length);

  players = players.map((p, i) => {
    if (i === impostorIndex) {
      return { ...p, role: "IMPOSTOR" };
    } else {
      return { ...p, role: "WORD:" + data.word };
    }
  });

  await supabase.from("rooms")
    .update({ players, started: true })
    .eq("code", room);
};

/* SHOW ROLE (PRIVATE) */
window.showRole = async () => {
  const { data } = await supabase.from("rooms").select("*").eq("code", room).single();

  const me = data.players.find(p => p.nick === nick);
  myRole = me.role;

  document.getElementById("role").innerText = myRole;
};

window.hideRole = () => {
  document.getElementById("role").innerText = "🔒 hidden (pass phone)";
};

/* HINTS */
window.addHint = async () => {
  const h = document.getElementById("hint").value;

  const { data } = await supabase.from("rooms").select("*").eq("code", room).single();

  let hints = data.hints || [];
  hints.push(h);

  await supabase.from("rooms").update({ hints }).eq("code", room);
};

/* OPEN ROOM */
function openRoom(code){
  document.getElementById("roomTitle").innerText = "Room: " + code;
  loadRoom();
  listen();
}

/* LOAD */
async function loadRoom(){
  const { data } = await supabase.from("rooms").select("*").eq("code", room).single();

  document.getElementById("players").innerHTML =
    (data.players || []).map(p => "👤 " + p.nick).join("<br>");

  document.getElementById("hints").innerHTML =
    (data.hints || []).map(h => "💡 " + h).join("<br>");
}

/* REALTIME */
function listen(){
  if (channel) supabase.removeChannel(channel);

  channel = supabase.channel("room-"+room)
    .on("postgres_changes",
      { event:"UPDATE", schema:"public", table:"rooms", filter:`code=eq.${room}` },
      () => loadRoom()
    )
    .subscribe();
}
</script>

</body>
</html>
