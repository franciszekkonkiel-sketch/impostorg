<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Impostor Game PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0b1220,#020617);
  color:white;
  text-align:center;
}

.container{max-width:650px;margin:auto;padding:15px;}

.card{
  background:rgba(255,255,255,0.08);
  margin:10px;
  padding:15px;
  border-radius:16px;
}

input, select{
  padding:8px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.hidden{display:none;}

.list{
  text-align:left;
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.smallBtn{
  margin-left:10px;
  background:#ef4444;
  padding:5px 10px;
  font-size:12px;
}
</style>
</head>

<body>

<h1>🎭 IMPOSTOR GAME PRO</h1>

<div class="container">

<!-- ⚙️ USTAWIENIA -->
<div class="card">
  <h3>⚙️ Ustawienia gry</h3>

  <label>Ilu impostorów?</label><br>
  <input type="number" id="impostorCount" value="1" min="1"><br><br>

  <label>Czy impostorzy się znają?</label><br>
  <select id="knowEachOther">
    <option value="yes">Tak</option>
    <option value="no">Nie</option>
  </select>
</div>

<!-- ➕ HASŁA -->
<div class="card">
  <h3>➕ Dodaj hasło</h3>

  <input id="wordInput" placeholder="Hasło">
  <input id="hintInput" placeholder="Podpowiedź">
  <button onclick="addWord()">Dodaj</button>

  <br><br>
  <button onclick="toggleDB()">📚 Pokaż bazę</button>

  <div id="dbView" class="list hidden"></div>
</div>

<!-- 👥 GRACZE -->
<div class="card">
  <h3>👥 Gracze</h3>
  <input id="name" placeholder="Nazwa">
  <button onclick="addPlayer()">Dodaj</button>
  <div id="players"></div>
</div>

<!-- START -->
<div class="card">
  <button onclick="startGame()">START GRY</button>
</div>

<!-- GAME -->
<div class="card hidden" id="gameBox">
  <h2 id="turn"></h2>

  <div id="roleInfo" style="margin:10px;font-weight:bold;"></div>

  <p id="word"></p>

  <button onclick="next()">NEXT</button>
</div>

<!-- KONIEC -->
<div class="card hidden" id="endBox">
  <h2>🧹 KONIEC RUNDY</h2>
  <button onclick="newRound()">🔁 NOWA RUNDA</button>
</div>

</div>

<script>

/* 📦 BAZA */
let db = JSON.parse(localStorage.getItem("db")) || [];

/* 👥 */
let players = [];
let index = 0;

/* 🎭 */
let impostors = [];
let currentItem = null;

/* ➕ */
function addWord(){
  let w=document.getElementById("wordInput").value;
  let h=document.getElementById("hintInput").value;

  if(!w||!h) return;

  db.push({word:w,hint:h});
  localStorage.setItem("db",JSON.stringify(db));

  document.getElementById("wordInput").value="";
  document.getElementById("hintInput").value="";

  renderDB();
}

/* 📚 */
function toggleDB(){
  let box=document.getElementById("dbView");
  box.classList.toggle("hidden");
  renderDB();
}

function renderDB(){
  let box=document.getElementById("dbView");

  if(db.length===0){
    box.innerHTML="Brak haseł";
    return;
  }

  box.innerHTML=db.map((d,i)=>
    `<div>🔤 ${d.word} → 🤫 ${d.hint}</div>`
  ).join("");
}

/* 👥 */
function addPlayer(){
  let n=document.getElementById("name").value;
  if(!n) return;
  players.push(n);
  renderPlayers();
}

function renderPlayers(){
  document.getElementById("players").innerHTML =
  players.map(p=>`<div>${p}</div>`).join("");
}

/* 🚀 START */
function startGame(){

  if(players.length < 2){
    alert("Min 2 graczy!");
    return;
  }

  if(db.length === 0){
    alert("Dodaj hasła!");
    return;
  }

  index = 0;

  let impostorCount = parseInt(document.getElementById("impostorCount").value);
  let knowEachOther = document.getElementById("knowEachOther").value;

  /* 🔤 jedno hasło */
  currentItem = db[Math.floor(Math.random() * db.length)];

  /* 🎭 LOS IMPOS TORÓW */
  impostors = [];

  while(impostors.length < impostorCount){
    let r = Math.floor(Math.random() * players.length);
    if(!impostors.includes(r)){
      impostors.push(r);
    }
  }

  /* jeśli mają się znać */
  if(knowEachOther === "yes"){
    console.log("Impostorzy:", impostors);
  }

  document.getElementById("gameBox").classList.remove("hidden");
  document.getElementById("endBox").classList.add("hidden");

  show();
}

/* 👁 */
function show(){

  document.getElementById("turn").innerText = "👤 " + players[index];

  let roleBox = document.getElementById("roleInfo");

  if(impostors.includes(index)){
    roleBox.innerHTML =
      "🚨 JESTEŚ IMPOSTOREM!<br>💡 Podpowiedź: " + currentItem.hint;

    document.getElementById("word").innerText = "🤫 Udawaj!";
  } else {
    roleBox.innerText = "✅ Jesteś zwykłym graczem";
    document.getElementById("word").innerText = "🔤 HASŁO: " + currentItem.word;
  }
}

/* NEXT */
function next(){
  index++;

  if(index >= players.length){
    endGame();
    return;
  }

  show();
}

/* 🧹 END */
function endGame(){
  document.getElementById("gameBox").classList.add("hidden");
  document.getElementById("endBox").classList.remove("hidden");

  document.getElementById("roleInfo").innerHTML = "";
  document.getElementById("word").innerText = "";
}

/* 🔁 NOWA RUNDA */
function newRound(){
  index = 0;
  impostors = [];
  currentItem = null;

  document.getElementById("endBox").classList.add("hidden");

  startGame();
}

</script>

</body>
</html>
